{% extends "base.html" %}

{% block title %}Submit New Idea - Case Similarity System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-lightbulb"></i> Submit New Idea</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/submit">
                    
                    <!-- Idea Name -->
                    <div class="mb-3">
                        <label class="form-label">Idea Name *</label>
                        <input type="text" class="form-control" name="idea_name" required>
                    </div>

                    <!-- Domain -->
                    <div class="mb-3">
                        <label class="form-label">Domain *</label>
                        <select class="form-select" name="domain" required>
                            <option value="">Select a domain...</option>
                            <option value="tax_revenue">Tax & Revenue</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="law_enforcement">Law Enforcement</option>
                            <option value="education">Education</option>
                            <option value="agriculture">Agriculture</option>
                            <option value="environment">Environment</option>
                            <option value="governance">Governance</option>
                            <option value="public_services">Public Services</option>
                        </select>
                    </div>

                    <!-- Funding Source -->
                    <div class="mb-3">
                        <label class="form-label">Funding Source *</label>
                        <input type="text" class="form-control" name="fundingSource" required
                               placeholder="e.g., Digital India Scheme, State Budget, Central Government">
                    </div>

                    <!-- Expected Benefits -->
                    <div class="mb-3">
                        <label class="form-label">Expected Benefits *</label>
                        <textarea class="form-control" name="expected_benefits" rows="3" required
                                  placeholder="Describe the expected benefits and outcomes..."></textarea>
                    </div>

                    <!-- Idea Description -->
                    <div class="mb-3">
                        <label class="form-label">Idea Description *</label>
                        <textarea class="form-control" name="idea_description" rows="4" required
                                  placeholder="Provide detailed description of your idea..."></textarea>
                    </div>

                    <!-- Potential Challenges -->
                    <div class="mb-3">
                        <label class="form-label">Potential Challenges *</label>
                        <textarea class="form-control" name="potential_challenges" rows="3" required
                                  placeholder="Describe potential challenges and constraints..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-search"></i> Find Similar Cases
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
